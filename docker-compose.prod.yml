name: shopflow

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-shopflow}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - shopflow_prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: staging
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-shopflow}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/actuator/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "--no-check-certificate", "https://shopflow.hoangtuan.dev/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  shopflow_prod_pgdata:
  caddy_data:
  caddy_config:
